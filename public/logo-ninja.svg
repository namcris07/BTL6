<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f12"></stop>
      <stop offset="100%" stop-color="#1a1a1f"></stop>
    </linearGradient>

    <!-- Neon outline -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06d6a0"></stop>
      <stop offset="100%" stop-color="#4cc9f0"></stop>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.45"></feDropShadow>
    </filter>
  </defs>

  <!-- Rounded Background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bg)"></rect>

  <!-- Ninja Mask -->
  <g stroke="url(#neon)" stroke-width="3" filter="url(#shadow)">
    <!-- Head circle -->
    <circle cx="64" cy="56" r="28" fill="#151518" stroke-width="2"></circle>

    <!-- Eye band highlight -->
    <path d="M40 55 Q64 45 88 55 Q64 65 40 55 Z" fill="#000" stroke="url(#neon)" stroke-width="2"></path>
  </g>

  <!-- Eyes -->
  <ellipse cx="54" cy="57" rx="6" ry="4" fill="#fff"></ellipse>
  <ellipse cx="74" cy="57" rx="6" ry="4" fill="#fff"></ellipse>

  <!-- Eye pupils -->
  <circle cx="54" cy="57" r="2" fill="#06d6a0"></circle>
  <circle cx="74" cy="57" r="2" fill="#4cc9f0"></circle>

  <!-- Lower mask -->
  <path d="M44 70 Q64 90 84 70" stroke="#0a0a0c" fill="none" stroke-width="3"></path>

  <!-- Katana behind the head -->
  <g stroke="url(#neon)" stroke-width="3" stroke-linecap="round">
    <line x1="30" y1="32" x2="58" y2="12"></line>
    <line x1="98" y1="32" x2="70" y2="12"></line>
  </g>

  <!-- Title -->
  <text x="50%" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af" letter-spacing="2">
    NINJA
  </text>
</svg>
